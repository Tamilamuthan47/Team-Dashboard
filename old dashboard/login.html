<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — A#100263 Collaborative Workspace</title>
  <meta name="description"
    content="Sign in to A#100263 — The premium collaborative workspace for your team to assign tasks, submit work, and track progress." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    /* ── CSS Variables (mirrored from dashboard) ── */
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #161822;
      --bg-card: rgba(22, 24, 38, 0.85);
      --bg-input: rgba(255, 255, 255, 0.04);
      --bg-input-focus: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-border-hover: rgba(255, 255, 255, 0.1);
      --text-primary: #f0f0f5;
      --text-secondary: #a0a3b8;
      --text-muted: #5a5d72;
      --accent-purple: #a855f7;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --gradient-primary: linear-gradient(135deg, #a855f7, #3b82f6);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --shadow-glow: 0 0 40px rgba(168, 85, 247, 0.18);
      --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Orbitron', monospace;
      --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-md: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-primary);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; border: none; outline: none; }
    input { font-family: inherit; outline: none; }

    /* ── Ambient Background Orbs ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 20s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 550px; height: 550px; background: var(--accent-purple); top: -180px; left: -120px; }
    .bg-orb-2 { width: 450px; height: 450px; background: var(--accent-blue); bottom: -120px; right: -80px; animation-delay: -7s; }
    .bg-orb-3 { width: 320px; height: 320px; background: #06b6d4; top: 50%; left: 50%; animation-delay: -14s; }

    @keyframes orbFloat {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.05); }
      100% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* ── Grid lines decorative background ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    /* ── Login Wrapper ── */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand Header ── */
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(168, 85, 247, 0.1);
      border-radius: 18px;
      border: 1px solid rgba(168, 85, 247, 0.25);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.15);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.15); }
      50%       { box-shadow: 0 0 50px rgba(168, 85, 247, 0.3), 0 0 0 6px rgba(168, 85, 247, 0.06); }
    }

    .brand-title {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .brand-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      letter-spacing: 0.3px;
      text-align: center;
    }

    /* ── Login Card ── */
    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 36px 32px;
      box-shadow: var(--shadow-glow), 0 24px 80px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    /* Subtle top gradient accent */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.6), rgba(59,130,246,0.6), transparent);
    }

    .login-heading {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      text-align: center;
    }

    .login-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .form-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      pointer-events: none;
      transition: color var(--transition-fast);
    }

    .form-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 12px 14px 12px 42px;
      color: var(--text-primary);
      font-size: 0.88rem;
      transition: all var(--transition-fast);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      background: var(--bg-input-focus);
      border-color: rgba(168, 85, 247, 0.45);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
    }

    .form-input:focus + .input-icon,
    .input-wrapper:focus-within .input-icon {
      color: var(--accent-purple);
    }

    /* Password toggle button */
    .toggle-pwd {
      position: absolute;
      right: 14px;
      background: none;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      transition: color var(--transition-fast);
      padding: 4px;
    }

    .toggle-pwd:hover { color: var(--text-primary); }

    /* ── Error message ── */
    .error-msg {
      display: none;
      font-size: 0.76rem;
      color: var(--accent-red);
      margin-top: 2px;
      padding: 8px 12px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-sm);
      animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    .error-msg.show { display: block; }

    @keyframes shake {
      10%, 90% { transform: translateX(-2px); }
      20%, 80% { transform: translateX(3px); }
      30%, 50%, 70% { transform: translateX(-4px); }
      40%, 60% { transform: translateX(4px); }
    }

    /* ── Remember / Forgot Row ── */
    .form-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: -4px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text-secondary);
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      display: none;
    }

    .custom-checkbox {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--glass-border-hover);
      border-radius: 4px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }

    .checkbox-label input:checked ~ .custom-checkbox {
      background: var(--gradient-primary);
      border-color: transparent;
    }

    .custom-checkbox::after {
      content: '';
      display: block;
      width: 4px;
      height: 7px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .checkbox-label input:checked ~ .custom-checkbox::after {
      opacity: 1;
    }

    .forgot-link {
      font-size: 0.78rem;
      color: var(--accent-purple);
      font-weight: 500;
      transition: color var(--transition-fast);
    }

    .forgot-link:hover { color: var(--accent-blue); }

    /* ── Login Button ── */
    .btn-login {
      width: 100%;
      padding: 13px 20px;
      background: var(--gradient-primary);
      color: white;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      transition: all var(--transition-fast);
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #b87af8, #5b9cf7);
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .btn-login:hover::before { opacity: 1; }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(168, 85, 247, 0.4); }
    .btn-login:active { transform: translateY(0); }

    .btn-login span, .btn-login svg { position: relative; z-index: 1; }

    /* Loading state */
    .btn-login.loading .btn-text { opacity: 0; }
    .btn-login.loading .btn-spinner { display: block; }
    .btn-spinner {
      display: none;
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    .divider-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      flex-shrink: 0;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* ── Role selector ── */
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .role-option input[type="radio"] { display: none; }

    .role-option-label {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--glass-border);
      background: var(--bg-input);
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 500;
      transition: all var(--transition-fast);
    }

    .role-option input:checked ~ .role-option-label {
      border-color: rgba(168, 85, 247, 0.5);
      background: rgba(168, 85, 247, 0.08);
      color: var(--text-primary);
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.08);
    }

    .role-option-label:hover {
      border-color: var(--glass-border-hover);
      background: var(--bg-input-focus);
    }

    .role-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .role-icon.captain { background: rgba(168, 85, 247, 0.15); color: var(--accent-purple); }
    .role-icon.member  { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      font-size: 0.76rem;
      color: var(--text-muted);
      margin-top: 20px;
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(168, 85, 247, 0.5);
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      10%  { opacity: 1; transform: translateY(90vh) scale(1); }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(20px) scale(0); opacity: 0; }
    }

    /* ── Success state overlay ── */
    .success-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(16, 185, 129, 0.06);
      border-radius: var(--radius-xl);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.3s ease-out;
      z-index: 10;
    }

    .success-overlay.show { display: flex; }

    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(16, 185, 129, 0.15);
      border: 2px solid rgba(16, 185, 129, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-green);
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-text {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent-green);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 28px 20px; }
      .role-selector { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <!-- Background Elements -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-grid"></div>

  <!-- Floating Particles -->
  <div class="particles" id="particles-container"></div>

  <!-- Login Wrapper -->
  <div class="login-wrapper">
    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#loginGrad)" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="loginGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#a855f7" />
              <stop offset="100%" style="stop-color:#3b82f6" />
            </linearGradient>
          </defs>
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2" />
          <line x1="12" y1="22" x2="12" y2="15.5" />
          <polyline points="22 8.5 12 15.5 2 8.5" />
        </svg>
      </div>
      <div class="brand-title">A#100263</div>
      <div class="brand-subtitle">Collaborative Workspace · Team Dashboard</div>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <!-- Success Overlay -->
      <div class="success-overlay" id="success-overlay">
        <div class="success-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        <div class="success-text">Welcome back! Redirecting…</div>
      </div>

      <h1 class="login-heading">Sign In</h1>
      <p class="login-desc">Access your team workspace with Google</p>

      <form class="login-form" id="login-form" novalidate>
        <div class="error-msg" id="error-msg">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="display:inline;vertical-align:middle;margin-right:6px;">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="error-text">Google sign-in failed. Please try again.</span>
        </div>

        <div class="form-group">
          <label class="form-label">Continue with Google</label>
          <div id="google-signin-btn" style="display:flex;justify-content:center;"></div>
          <p style="font-size:0.76rem;color:var(--text-muted);text-align:center;line-height:1.5;">
            Use your team Google account. Captain role is assigned by email.
          </p>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      Team A#100263 · Collaborative Workspace &nbsp;·&nbsp; <span id="login-year"></span>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    /* ── Firebase Config ── */
    const firebaseConfig = {
      apiKey: "AIzaSyD0jET4SPSCS0nr3dXSnGf58Lk2JcZAD2c",
      authDomain: "dashboard-daaa3.firebaseapp.com",
      projectId: "dashboard-daaa3",
      storageBucket: "dashboard-daaa3.firebasestorage.app",
      messagingSenderId: "891432171999",
      appId: "1:891432171999:web:829d25e749741feeb9ac6a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const CAPTAIN_EMAIL = 'tamilamuthanpanneerselvam.it25@bitsathy.ac.in';

    const errorMsg  = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('show');
      void errorMsg.offsetWidth;
      errorMsg.classList.add('show');
    }

    function determineRoleFromEmail(email) {
      if (email.toLowerCase() === CAPTAIN_EMAIL.toLowerCase()) return 'captain';
      return 'member';
    }

    function setLoadingState(isLoading) {
      const btn = document.getElementById('google-signin-btn');
      const loginBtn = btn?.querySelector('button');
      if (loginBtn) {
        loginBtn.disabled = isLoading;
        loginBtn.style.opacity = isLoading ? '0.6' : '1';
      }
    }

    async function handleGoogleSignIn() {
      setLoadingState(true);
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;

        const role = determineRoleFromEmail(user.email);
        sessionStorage.setItem('a100263_user', JSON.stringify({
          name: user.displayName || 'User',
          role,
          email: user.email,
          picture: user.photoURL || '',
          uid: user.uid
        }));

        document.getElementById('success-overlay').classList.add('show');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (error) {
        console.error('Google sign-in error:', error);
        if (error.code === 'auth/popup-closed-by-user') {
          showError('Sign-in was cancelled. Please try again.');
        } else {
          showError('Google sign-in failed: ' + error.message);
        }
        setLoadingState(false);
      }
    }

    function initGoogleSignIn() {
      /* ── Year ── */
      document.getElementById('login-year').textContent = new Date().getFullYear();

      /* ── Particles ── */
      const container = document.getElementById('particles-container');
      const colors = ['rgba(168,85,247,0.5)', 'rgba(59,130,246,0.4)', 'rgba(6,182,212,0.35)'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText = `
          left: ${Math.random() * 100}%;
          width: ${Math.random() * 2 + 1}px;
          height: ${Math.random() * 2 + 1}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-duration: ${Math.random() * 12 + 10}s;
          animation-delay: ${Math.random() * -20}s;
        `;
        container.appendChild(p);
      }

      /* ── Create Google Sign-In Button ── */
      const googleSigninBtn = document.getElementById('google-signin-btn');
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'btn-login';
      button.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <polyline points="8 12 12 16 16 8" />
        </svg>
        <span class="btn-text">Sign in with Google</span>
      `;
      button.addEventListener('click', (e) => {
        e.preventDefault();
        handleGoogleSignIn();
      });
      googleSigninBtn.appendChild(button);
    }

    // Avoid stale sessions on login page
    sessionStorage.removeItem('a100263_user');
    window.addEventListener('load', initGoogleSignIn);
  </script>
